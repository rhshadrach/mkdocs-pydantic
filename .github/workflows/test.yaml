name: Test
on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  test:
    concurrency:
      group: test-${{ github.event_name == 'push' && github.run_number || github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-extras: 'test'

      - name: Test
        run: pytest
